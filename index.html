<!DOCTYPE html>
<html lang="ru">
<head>

    <title>Квест 💜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
